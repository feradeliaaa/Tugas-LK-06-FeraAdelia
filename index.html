<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Evaluasi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>Form Evaluasi</h1>
    <p>Berikan masukan terbaikmu untuk pengembangan sistem kami.</p>
  </div>

  <!-- RIGHT SIDE (FORM) -->
  <div class="right">
    <form id="contactForm">

      <div class="input-group">
        <input type="text" id="nama" required>
        <label>Nama</label>
      </div>

      <div class="input-group">
        <input type="email" id="email" required>
        <label>Email</label>
      </div>

      <div class="input-group">
        <input type="tel" id="telp" required>
        <label>No Telepon</label>
      </div>

      <div class="input-group">
        <select id="kategori" required>
          <option value=""></option>
          <option>Mahasiswa</option>
          <option>Dosen</option>
        </select>
        <label>Kategori</label>
      </div>

      <div class="input-group">
        <textarea id="kesan" required></textarea>
        <label>Kesan</label>
      </div>

      <div class="input-group">
        <textarea id="pesan" required></textarea>
        <label>Kritik & Saran</label>
      </div>

      <button type="submit">Kirim</button>

    </form>

    <div id="hasil"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
